name: ✨ Feature Request
description: Suggest an enhancement or new feature
assignees: []
labels: ["enhancement", "feature-request"]
body:
  - type: markdown
    attributes:
      value: "### Help us understand your feature idea! 💡"
  
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve or what capability is missing?
      placeholder: |
        Currently, we cannot...
        It would be helpful to...
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement
      placeholder: |
        - New preprocessing step: 
        - New model type to support: 
        - New evaluation metric:
        - Expected behavior:
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Other ways to solve this?
      placeholder: "We could also consider..."
    validations:
      required: false
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Impact
      description: How important is this feature?
      options:
        - Low - Nice to have
        - Medium - Useful improvement
        - High - Critical capability
    validations:
      required: true
