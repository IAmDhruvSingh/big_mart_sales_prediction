name: 🐛 Bug Report
description: Report a bug or issue you've found
assignees: []
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide detailed information to help us reproduce and fix it.
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: "What went wrong?"
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue
      placeholder: |
        1. Run the preprocessing script with...
        2. Load the model with...
        3. Call the prediction with...
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What should happen?"
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "What actually happened?"
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant system information
      placeholder: |
        - OS: Windows/Linux/macOS
        - Python version: 3.x.x
        - Key dependencies: pandas, scikit-learn versions
    validations:
      required: false
  
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Stack Traces
      description: Paste error messages or stack traces
      render: shell
    validations:
      required: false
